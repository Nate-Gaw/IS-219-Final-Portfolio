<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="../assets/js/main.js" defer></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .contact-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .contact-hero {
      position: relative;
      flex: 1;
      min-height: calc(100vh - 5rem);
      display: grid;
      place-items: center;
      padding: clamp(1.25rem, 3vw, 2.5rem);
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.62)),
        url('../Pics/collage.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      isolation: isolate;
    }

    .contact-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      z-index: -1;
    }

    .contact-card {
      width: min(100%, 56rem);
      padding: clamp(1.1rem, 2.8vw, 2rem);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 2rem;
      background: rgba(10, 14, 22, 0.56);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .contact-kicker {
      margin: 0 0 0.7rem;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .contact-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(1.9rem, 4vw, 3.7rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .contact-copy {
      width: min(100%, 44rem);
      margin: 0.95rem auto 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: clamp(0.98rem, 1.5vw, 1.08rem);
      line-height: 1.55;
    }

    .contact-close {
      margin: 0.9rem 0 0;
      color: rgba(255, 255, 255, 0.96);
      font-size: clamp(0.98rem, 1.3vw, 1.05rem);
      font-weight: 600;
    }

    .contact-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1.2rem;
    }

    .contact-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      min-width: 10.5rem;
      min-height: 3rem;
      padding: 0 1.15rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .contact-button:hover,
    .contact-button:focus-visible {
      transform: translateY(-2px) scale(1.01);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .contact-button-icon {
      font-size: 1.05rem;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .contact-hero {
        min-height: calc(100vh - 4.5rem);
        padding: 1rem;
      }

      .contact-card {
        border-radius: 1.5rem;
        padding: 1rem;
      }

      .contact-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .contact-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header id="site-header"></header>
    <main class="contact-page">
      <section class="contact-hero" aria-labelledby="contact-title">
        <div class="contact-card">
          <p class="contact-kicker">Contact</p>
          <h1 class="contact-title" id="contact-title">Thank you for visiting my page.</h1>
          <p class="contact-copy">
            One thing I love most about life is being surrounded by people - learning, building, and growing together.
          </p>
          <p class="contact-close">So please feel free to reach out to me.</p>

          <div class="contact-actions" aria-label="Primary contact links">
            <a class="contact-button" href="https://www.linkedin.com/in/nathanael-gaw/" target="_blank" rel="noreferrer noopener">
              <span class="contact-button-icon" aria-hidden="true">in</span>
              <span>LinkedIn</span>
            </a>
            <a class="contact-button" href="https://github.com/Nate-Gaw" target="_blank" rel="noreferrer noopener">
              <span class="contact-button-icon" aria-hidden="true">{ }</span>
              <span>GitHub</span>
            </a>
            <a class="contact-button" href="mailto:nathanaelgaw@gmail.com">
              <span class="contact-button-icon" aria-hidden="true">✉</span>
              <span>Email Me</span>
            </a>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
